<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading IOBRportal...</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
    }

    .logo {
      width: 220px;
      max-width: 80vw;
      height: auto;
      display: block;
      margin: 0 auto 28px auto;
    }

    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px auto;
      border: 4px solid #d9d9d9;
      border-top: 4px solid #003388;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .text {
      font-size: 30px;
      font-weight: bold;
      color: #003388;
      margin: 0;
    }

    .subtext {
      margin-top: 10px;
      font-size: 14px;
      color: #666666;
    }

    .subtext a {
      color: #003388;
      text-decoration: none;
    }

    .subtext a:hover {
      text-decoration: underline;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    setTimeout(function () {
      window.location.href = "http://biotree.top:38124/IOBRportal/";
    }, 2000);
  </script>
</head>

<body>
  <div class="container">
    <img class="logo" src="https://iobr.github.io/IOBRportal/man/figures/IOBRportal.png" alt="IOBRportal logo">

    <div class="spinner"></div>

    <p class="text">Loading IOBRportal...</p>

    <div class="subtext">
      Redirecting to the deployed application.<br>
      If it does not open automatically,
      <a href="http://biotree.top:38124/IOBRportal/">click here</a>.
    </div>
  </div>
</body>

</html>
