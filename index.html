<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading IOBRportal...</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      text-align: center;
      padding: 24px;
    }

    .logo {
      max-width: 240px;
      width: 100%;
      height: auto;
      margin-bottom: 28px;
      display: block;
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 18px auto;
      border: 4px solid #d9d9d9;
      border-top: 4px solid #003388;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      color: #003388;
      line-height: 1.4;
    }

    .subtext {
      margin-top: 10px;
      font-size: 14px;
      color: #666666;
    }

    .subtext a {
      color: #003388;
      text-decoration: none;
    }

    .subtext a:hover {
      text-decoration: underline;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .logo {
        max-width: 180px;
        margin-bottom: 24px;
      }

      .loading-text {
        font-size: 24px;
      }
    }
  </style>

  <script>
    setTimeout(function () {
      window.location.replace("http://biotree.top:38124/IOBRportal/");
    }, 1400);
  </script>
</head>

<body>
  <div class="wrapper">
    <img src="man/figures/IOBRportal.png" alt="IOBRportal logo" class="logo">

    <div class="spinner"></div>

    <p class="loading-text">Loading IOBRportal...</p>

    <div class="subtext">
      Redirecting to the deployed application.
      <br>
      If it does not open automatically,
      <a href="http://biotree.top:38124/IOBRportal/">click here</a>.
    </div>
  </div>
</body>

</html>
