<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IOBRportal</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
    }

    .logo {
      width: 220px;
      max-width: 80vw;
      height: auto;
      display: block;
      margin: 0 auto 24px auto;
    }

    .spinner {
      width: 38px;
      height: 38px;
      margin: 0 auto;
      border: 4px solid #d9d9d9;
      border-top: 4px solid #003388;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    window.location.href = "http://biotree.top:38124/IOBRportal/";
  </script>
</head>

<body>
  <div class="container">
    <img class="logo" src="man/figures/IOBRportal.png?v=1" alt="IOBRportal logo">
    <div class="spinner"></div>
  </div>
</body>

</html>
